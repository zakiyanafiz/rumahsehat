<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daftar Akun - Rumah Sehat</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&display=swap" rel="stylesheet">
</head>
<body style="background-color: #f4f9ff;">

  <div class="login-container">
    <div class="login-left">
      <img src="assets/img/login-side.jpg" alt="Ilustrasi Daftar" class="login-image">
    </div>

    <div class="login-right">
      <h2>Buat Akun Baru</h2>
      <form action="login.html" method="get" class="login-form">

        <label for="name">Nama Lengkap</label>
        <input type="text" id="name" name="name" placeholder="Nama lengkap Anda" required>

        <label for="email">Email / No. HP</label>
        <input type="text" id="email" name="email" placeholder="Email atau No HP" required>

        <label for="password">Kata Sandi</label>
        <input type="password" id="password" name="password" placeholder="Buat kata sandi" required>

        <label for="confirm">Ulangi Kata Sandi</label>
        <input type="password" id="confirm" name="confirm" placeholder="Ulangi kata sandi" required>

        <button type="submit">Daftar</button>

        <div class="signup-link">
          Sudah punya akun? <a href="login.html">Masuk di sini</a>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
