<!-- login.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Rumah Sehat</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&display=swap" rel="stylesheet">
</head>
<body style="background:#f4f9ff;">
  <div class="login-container">
<!-- SESUDAH (gambar) -->
<div class="login-left">
  <img src="assets/img/login-side.jpg" alt="Tampilan Login" class="login-image">
</div>

    <div class="login-right">
      <h2>Selamat Datang</h2>
      <form action="index.html" method="get" class="login-form">
        <label for="email">Email / No. HP</label>
        <input type="text" id="email" name="email" required>

        <label for="password">Kata Sandi</label>
        <input type="password" id="password" name="password" required>

        <button type="submit">Masuk</button>

        <div class="signup-link">
          Belum punya akun? <a href="register.html">Daftar di sini</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
